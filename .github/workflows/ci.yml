name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  DATABASE_URL: postgresql+psycopg2://release_intel:release_intel@localhost:5432/release_intel
  TEST_DATABASE_URL: postgresql+psycopg2://release_intel:release_intel@localhost:5432/release_intel
  REDIS_URL: redis://localhost:6379/0
  CELERY_BROKER_URL: redis://localhost:6379/0
  CELERY_RESULT_BACKEND: redis://localhost:6379/1
  JWT_SECRET: ci-test-secret-key
  GITHUB_WEBHOOK_SECRET: test-webhook-secret
  GROQ_API_KEY: ""
  GEMINI_API_KEY: ""
  CORS_ORIGINS: http://localhost:3000

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check packages apps tests
      - name: Ruff format check
        run: ruff format --check packages apps tests

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: release_intel
          POSTGRES_PASSWORD: release_intel
          POSTGRES_DB: release_intel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U release_intel -d release_intel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run migrations
        run: alembic -c migrations/alembic.ini upgrade head
      - name: Unit tests
        run: pytest tests/unit tests/contract -v
      - name: Integration and E2E tests
        run: pytest tests/integration tests/e2e -v
      - name: AI eval suite
        run: pytest tests/evals -v -m eval
      - name: Generate eval report
        run: python tests/evals/runner.py
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: reports/

  web:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install and build
        run: |
          npm ci
          npm run build
